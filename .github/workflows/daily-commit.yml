name: Daily Progress Commit
on:
  schedule:
    # 8pm PT = 3am UTC (4am UTC during daylight saving time)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  commit-progress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Configure git
        run: |
          git config user.name "Julian McCrary"
          git config user.email "mccrary.julian@gmail.com"

      - name: Update progress log
        run: |
          echo "$(date +'%Y-%m-%d %H:%M:%S UTC') - daily check-in" >> progress.log

      - name: Commit and push
        run: |
          git add -A
          git commit -m "progress: $(date +'%Y-%m-%d')"
          git push
