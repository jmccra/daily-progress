name: Daily Progress Commit

on:
  schedule:
    # 8pm PT = 3am UTC (4am UTC during daylight saving time)
    - cron: '0 3 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  commit-progress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Julian McCrary"
          git config user.email "mccrary.julian@gmail.com"

      - name: Check for changes
        id: check_changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changes exist
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git commit -m "progress: $(date +'%Y-%m-%d')"
          git push
